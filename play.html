<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Blindtest Imposteur — Téléphone</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{
    --ink:#17111f; --panel:#231a2e; --panel2:#2c2038; --line:#3a2c49;
    --magenta:#ff3d7f; --gold:#ffc247; --teal:#34e0c4; --cloud:#f3ecf8; --muted:#9a8cab;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,#241733,var(--ink) 60%);
       color:var(--cloud);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif}
  .wrap{max-width:460px;margin:0 auto;padding:26px 18px 60px}
  .eyebrow{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700}
  h1{font-size:30px;font-weight:900;letter-spacing:-.02em;margin:8px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;
        padding:14px;color:var(--cloud);font-size:16px;outline:none;margin-bottom:10px}
  input::placeholder{color:var(--muted)}
  .btn{width:100%;border:none;border-radius:12px;padding:15px;font-weight:800;font-size:16px;cursor:pointer;color:#1a1020;background:var(--magenta)}
  .btn:disabled{opacity:.45}
  .btn.gold{background:var(--gold)} .btn.ghost{background:var(--panel2);color:var(--cloud);border:1px solid var(--line)}
  .muted{color:var(--muted)} .center{text-align:center}
  .suspect{display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--panel2);
           border:1.5px solid var(--line);border-radius:14px;padding:16px 8px;cursor:pointer;color:var(--cloud)}
  .suspect:disabled{opacity:.35}
  .av{border-radius:12px;display:grid;place-items:center;font-weight:900;color:#1a1020}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ok{color:var(--teal)}
  .toast{background:var(--panel2);border-radius:10px;padding:10px 12px;font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const socket = io();
const COLORS = ["#ff3d7f","#ffc247","#34e0c4","#7c8cff","#ff8a3d","#c47cff","#3ddc97","#ff5d5d"];
const app = document.getElementById("app");
const params = new URLSearchParams(location.search);
let myPid = null, myName = "", voted = false;

const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const av=(name,color,size)=>`<div class="av" style="width:${size}px;height:${size}px;background:${color};font-size:${size*0.42}px">${(name||"?").trim().charAt(0).toUpperCase()}</div>`;

/* ----------------------------- REJOINDRE ----------------------------- */
function renderJoin(err){
  app.innerHTML = `
    <div class="center"><div class="eyebrow" style="color:var(--magenta)">Blindtest · imposteur</div>
    <h1>Rejoindre la partie</h1></div>
    <div class="card" style="margin-top:14px">
      <input id="name" placeholder="Ton prénom" maxlength="20" value="${esc(myName)}">
      <input id="code" placeholder="Code du salon (4 lettres)" maxlength="4"
             style="text-transform:uppercase;letter-spacing:.2em;font-family:ui-monospace,monospace"
             value="${esc(params.get("room")||"")}">
      ${err?`<div class="toast" style="color:var(--magenta)">${esc(err)}</div>`:""}
      <button class="btn" id="go" style="margin-top:6px">Entrer</button>
    </div>`;
  document.getElementById("go").onclick=()=>{
    myName=document.getElementById("name").value.trim();
    const code=document.getElementById("code").value.trim().toUpperCase();
    if(!myName) return renderJoin("Mets ton prénom.");
    if(code.length<4) return renderJoin("Le code fait 4 lettres.");
    socket.emit("player:join",{code,name:myName},(r)=>{
      if(!r.ok) return renderJoin(r.error);
      myPid=r.pid;
      if(r.phase==="round") renderGuess();
      else renderSubmit();
    });
  };
}

/* ----------------------------- OAUTH SPOTIFY PKCE ----------------------------- */
function b64url(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,""); }
async function sha256(str){ return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)); }

function getSpotifySession(){
  try {
    const t=localStorage.getItem("sp_token"), e=parseInt(localStorage.getItem("sp_expiry")||"0");
    return (t && e > Date.now()) ? t : null;
  } catch(_){ return null; }
}
function setSpotifySession(token, expiry){
  try { localStorage.setItem("sp_token",token); localStorage.setItem("sp_expiry",String(expiry)); } catch(_){}
}
function clearSpotifySession(){
  try { localStorage.removeItem("sp_token"); localStorage.removeItem("sp_expiry"); } catch(_){}
}

async function startSpotifyOAuth(){
  const res = await fetch("/api/spotify-client-id").then(r=>r.json()).catch(()=>({}));
  if(!res.clientId){ alert("Le serveur n'a pas de SPOTIFY_CLIENT_ID configuré."); return; }
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = b64url(await sha256(verifier));
  localStorage.setItem("spotify_pkce_verifier", verifier);
  localStorage.setItem("spotify_client_id", res.clientId);
  const redirectUri = location.origin + "/spotify-callback.html";
  const url = "https://accounts.spotify.com/authorize?" + new URLSearchParams({
    client_id: res.clientId,
    response_type: "code",
    redirect_uri: redirectUri,
    scope: "playlist-read-private playlist-read-collaborative",
    code_challenge_method: "S256",
    code_challenge: challenge,
  });
  const popup = window.open(url, "spotify-auth", "width=500,height=700,noopener=0");
  return new Promise((resolve, reject) => {
    const handler = (e) => {
      if(e.data?.type==="spotify-auth-success"){ window.removeEventListener("message",handler); setSpotifySession(e.data.token,e.data.expiry); resolve(e.data.token); }
      if(e.data?.type==="spotify-auth-error"){ window.removeEventListener("message",handler); reject(new Error(e.data.error)); }
    };
    window.addEventListener("message", handler);
    const iv = setInterval(()=>{ if(popup.closed){ clearInterval(iv); window.removeEventListener("message",handler); reject(new Error("Fenêtre fermée")); }},500);
  });
}

/* ----------------------------- SOUMETTRE SA PLAYLIST ----------------------------- */
function renderSubmit(done){
  const spToken = getSpotifySession();
  app.innerHTML = `
    <div class="center"><div class="eyebrow" style="color:var(--gold)">Étape secrète</div>
    <h1>Ta playlist Spotify</h1></div>
    <div class="card" style="margin-top:14px">
      ${done?`
        <div class="center" style="padding:8px 0">
          <div style="font-size:40px">✅</div>
          <div style="font-weight:800;font-size:18px;margin-top:6px">Playlist enregistrée&nbsp;!</div>
          <div class="muted" style="margin-top:6px">${done} morceaux prêts. Garde le secret 🤫<br>Attends que l'hôte lance la partie.</div>
        </div>
        <button class="btn ghost" id="again" style="margin-top:14px">Changer de playlist</button>
      `:`
        <p class="muted" style="margin-top:0">Colle le lien d'une de tes playlists Spotify. Personne d'autre ne le verra — c'est ça, le piège 👻</p>
        <input id="url" placeholder="https://open.spotify.com/playlist/...">
        <div id="authBand" style="margin:-4px 0 12px">
          ${spToken
            ? `<div class="muted" style="font-size:12px;color:var(--teal)">✓ Spotify autorisé — playlists privées OK <a href="#" id="disconnectSp" style="color:var(--muted);margin-left:6px">Déconnecter</a></div>`
            : `<div class="muted" style="font-size:12px">Playlist privée ? <a href="#" id="authSp" style="color:var(--gold)">Autoriser Spotify →</a></div>`}
        </div>
        <button class="btn gold" id="send">Envoyer ma playlist</button>
        <div id="status"></div>
      `}`;
  if(done){ document.getElementById("again").onclick=()=>renderSubmit(); return; }

  document.getElementById("authSp")?.addEventListener("click", async (e)=>{
    e.preventDefault();
    const authSp = document.getElementById("authSp");
    if(authSp) authSp.textContent = "⏳ Connexion…";
    try {
      await startSpotifyOAuth();
      renderSubmit();
    } catch(err){
      renderSubmit();
      setTimeout(()=>{ const s=document.getElementById("status"); if(s) s.innerHTML=`<div class="toast" style="color:var(--magenta)">Autorisation annulée ou échouée.</div>`; }, 50);
    }
  });

  document.getElementById("disconnectSp")?.addEventListener("click", (e)=>{ e.preventDefault(); clearSpotifySession(); renderSubmit(); });

  const send=document.getElementById("send"), status=document.getElementById("status");
  send.onclick=()=>{
    const url=document.getElementById("url").value.trim();
    if(!url) return;
    const userToken = getSpotifySession();
    send.disabled=true; status.innerHTML=`<div class="toast">⏳ Import en cours… (ça peut prendre quelques secondes)</div>`;
    socket.emit("player:submitPlaylist",{url, userToken},(r)=>{
      send.disabled=false;
      if(!r.ok){ status.innerHTML=`<div class="toast" style="color:var(--magenta)">${esc(r.error)}</div>`; return; }
      renderSubmit(r.count);
    });
  };
}

/* ----------------------------- DEVINER ----------------------------- */
function renderGuess(){
  voted=false;
  app.innerHTML = `
    <div class="center"><div class="eyebrow" style="color:var(--magenta)">À l'écoute</div>
    <h1>Devine le morceau&nbsp;!</h1></div>
    <div class="card" style="margin-top:14px">
      <p class="muted" style="margin-top:0">Crie la réponse à voix haute, ou tape-la ici pour la montrer sur l'écran principal.</p>
      <input id="g" placeholder="Titre / artiste…">
      <button class="btn" id="send">Proposer</button>
      <div id="sent"></div>
    </div>
    <div class="card" style="margin-top:14px"><div class="eyebrow" style="color:var(--gold)">Scores</div><div id="sb" class="muted" style="margin-top:8px">—</div></div>`;
  const g=document.getElementById("g"), sent=document.getElementById("sent");
  const fire=()=>{ const t=g.value.trim(); if(!t)return; socket.emit("player:guess",{text:t});
    g.value=""; sent.innerHTML=`<div class="toast ok">Envoyé ✓</div>`; setTimeout(()=>sent.innerHTML="",1200); };
  document.getElementById("send").onclick=fire;
  g.addEventListener("keydown",e=>{ if(e.key==="Enter") fire(); });
}

/* ----------------------------- VOTER ----------------------------- */
function renderVote(suspects){
  voted=false;
  app.innerHTML = `
    <div class="center"><div style="font-size:40px">👻</div>
    <div class="eyebrow" style="color:var(--magenta)">Vote secret</div>
    <h1>À qui est cette playlist&nbsp;?</h1></div>
    <div class="card" style="margin-top:14px">
      <div class="grid2" id="suspects">
        ${suspects.map((s,i)=>`<button class="suspect" data-id="${s.id}" ${s.id===myPid?"disabled":""}>
          ${av(s.name,COLORS[i%COLORS.length],46)}
          <span style="font-weight:700">${esc(s.name)}</span>
          <span class="muted" style="font-size:11px">${s.id===myPid?"toi":"le démasquer"}</span>
        </button>`).join("")}
      </div>
    </div>`;
  document.querySelectorAll("#suspects .suspect").forEach(b=>b.onclick=()=>{
    if(voted) return; voted=true;
    socket.emit("player:vote",{suspectId:b.dataset.id});
    app.innerHTML=`<div class="card center" style="margin-top:80px;padding:48px 24px">
      <div style="font-size:44px">🗳️</div><h1 style="font-size:24px">Vote enregistré</h1>
      <p class="muted">On attend les autres et la révélation sur l'écran principal…</p></div>`;
  });
}

/* ----------------------------- REVELATION / FIN ----------------------------- */
function renderReveal(ownerName){
  app.innerHTML=`<div class="card center" style="margin-top:70px;padding:46px 24px">
    <div class="eyebrow" style="color:var(--gold)">L'imposteur était</div>
    <h1 style="font-size:34px;margin:10px 0">${esc(ownerName)}</h1>
    <p class="muted">Regarde le débat sur l'écran principal 🍿</p></div>`;
}
function renderDone(sb){
  const w=sb[0]||{name:"—",score:0};
  app.innerHTML=`<div class="card center" style="margin-top:60px;padding:46px 24px">
    <div style="font-size:48px">👑</div><div class="eyebrow" style="color:var(--gold)">Vainqueur</div>
    <h1 style="font-size:32px;margin:10px 0">${esc(w.name)}</h1>
    <div style="color:var(--gold);font-family:ui-monospace,monospace">${w.score} points</div></div>`;
}

/* ----------------------------- EVENEMENTS ----------------------------- */
socket.on("phase",(d)=>{ if(d.phase==="round") renderGuess(); });
socket.on("vote:start",(d)=>renderVote(d.suspects));
socket.on("reveal",(d)=>renderReveal(d.ownerName));
socket.on("done",(sb)=>renderDone(sb));
socket.on("scoreboard",(sb)=>{ const el=document.getElementById("sb"); if(!el)return;
  el.innerHTML=sb.map((p,i)=>`${i+1}. ${esc(p.name)} — <b style="color:var(--gold)">${p.score}</b>`).join("<br>"); });
socket.on("roomClosed",()=>{ app.innerHTML=`<div class="card center" style="margin-top:80px;padding:46px 24px">
  <h1 style="font-size:24px">Partie terminée</h1><p class="muted">L'hôte a fermé le salon.</p></div>`; });

renderJoin();
</script>
</body>
</html>
