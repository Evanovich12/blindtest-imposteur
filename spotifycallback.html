<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Connexion Spotify…</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;
       background:#17111f;color:#f3ecf8;font-family:ui-sans-serif,system-ui,sans-serif;font-size:18px}
</style>
</head>
<body>
<div id="msg">Connexion en cours…</div>
<script>
(async () => {
  const msg = document.getElementById("msg");
  const params = new URLSearchParams(location.search);
  const code  = params.get("code");
  const error = params.get("error");

  if (error || !code) {
    msg.textContent = "Erreur : " + (error || "pas de code reçu");
    window.opener?.postMessage({ type: "spotify-auth-error", error: error || "no_code" }, "*");
    setTimeout(() => window.close(), 2000);
    return;
  }

  const verifier  = localStorage.getItem("spotify_pkce_verifier");
  const clientId  = localStorage.getItem("spotify_client_id");
  const redirectUri = location.origin + "/spotify-callback.html";

  if (!verifier || !clientId) {
    msg.textContent = "Erreur : session expirée, réessaie.";
    window.opener?.postMessage({ type: "spotify-auth-error", error: "no_verifier" }, "*");
    setTimeout(() => window.close(), 2000);
    return;
  }

  try {
    const res = await fetch("https://accounts.spotify.com/api/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        grant_type: "authorization_code",
        code,
        redirect_uri: redirectUri,
        client_id: clientId,
        code_verifier: verifier,
      }),
    });
    const data = await res.json();
    if (data.error || !data.access_token) throw new Error(data.error_description || data.error || "token manquant");
    msg.textContent = "✅ Connecté ! Tu peux fermer cette fenêtre.";
    localStorage.removeItem("spotify_pkce_verifier");
    localStorage.removeItem("spotify_client_id");
    window.opener?.postMessage({
      type: "spotify-auth-success",
      token: data.access_token,
      expiry: Date.now() + data.expires_in * 1000,
    }, "*");
    setTimeout(() => window.close(), 1000);
  } catch (e) {
    msg.textContent = "Erreur : " + e.message;
    window.opener?.postMessage({ type: "spotify-auth-error", error: e.message }, "*");
    setTimeout(() => window.close(), 3000);
  }
})();
</script>
</body>
</html>
