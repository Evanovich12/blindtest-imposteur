<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blindtest Imposteur — Écran principal</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<style>
  :root{
    --ink:#17111f; --panel:#231a2e; --panel2:#2c2038; --line:#3a2c49;
    --magenta:#ff3d7f; --gold:#ffc247; --teal:#34e0c4; --cloud:#f3ecf8; --muted:#9a8cab;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,#241733,var(--ink) 60%);
       color:var(--cloud);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 22px 70px}
  .eyebrow{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700}
  h1{font-size:38px;font-weight:900;letter-spacing:-.03em;margin:8px 0 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
       padding:13px 20px;font-weight:800;font-size:15px;cursor:pointer;color:#1a1020;background:var(--magenta)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:var(--panel2);color:var(--cloud);border:1px solid var(--line)}
  .btn.gold{background:var(--gold)}
  .row{display:flex;align-items:center;gap:10px}
  .av{border-radius:11px;display:grid;place-items:center;font-weight:900;color:#1a1020;flex:none}
  .code{font-family:ui-monospace,monospace;font-size:54px;font-weight:800;letter-spacing:.12em;color:var(--gold)}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px}
  .art{width:200px;height:200px;border-radius:16px;margin:0 auto;display:grid;place-items:center;overflow:hidden;
       background:radial-gradient(circle at 50% 35%,var(--panel2),var(--panel));font-size:70px}
  .art img{width:100%;height:100%;object-fit:cover}
  .bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin:14px 0}
  .bar>i{display:block;height:100%;width:0;background:var(--gold);transition:width .3s linear}
  .feed{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow:auto}
  .feed .entry{background:var(--panel2);border-radius:9px;padding:7px 11px;font-size:14px}
  .standings .srow{display:flex;align-items:center;gap:9px;padding:5px 0}
  .standings .srow b{margin-left:auto;font-family:ui-monospace,monospace;color:var(--gold);font-size:16px}
  .status-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .dot-none{background:var(--line)}
  .dot-partial{background:var(--gold)}
  .dot-both{background:var(--teal)}
  .two-col{display:grid;grid-template-columns:1.4fr .9fr;gap:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row" style="justify-content:space-between;margin-bottom:18px">
    <div><div class="eyebrow" style="color:var(--magenta)">Blindtest · imposteur</div><h1>Écran principal</h1></div>
    <div class="pill" id="roundTag">En attente</div>
  </div>

  <div class="two-col">
    <div id="stage"></div>
    <div class="card standings" id="standingsCard">
      <div class="eyebrow" style="color:var(--gold);margin-bottom:12px">Scores</div>
      <div id="standings"><div class="muted">Personne pour l'instant…</div></div>
    </div>
  </div>
</div>

<audio id="au"></audio>

<script>
const socket = io();
const COLORS = ["#ff3d7f","#ffc247","#34e0c4","#7c8cff","#ff8a3d","#c47cff","#3ddc97","#ff5d5d"];
const $ = (s)=>document.querySelector(s);
const stage = $("#stage");
const au = $("#au");

let roomCode = null;
let players = [];
let tracks = [], trackIdx = 0, revealed = false, roundIndex = 0, total = 0;
let currentPhase = "lobby";
let roundStatusMap = {}; // pid -> {titleFound, artistFound, score}

const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const colorOf = (id)=>{ const i=players.findIndex(p=>p.id===id); return COLORS[(i<0?0:i)%COLORS.length]; };
const initial = (n)=>(n||"?").trim().charAt(0).toUpperCase();
function av(name,color,size=38){ return `<div class="av" style="width:${size}px;height:${size}px;background:${color};font-size:${size*0.42}px">${initial(name)}</div>`; }

socket.emit("host:create",(res)=>{ roomCode=res.code; renderLobby(); });

socket.on("lobby",(r)=>{ players=r; if(currentPhase==="lobby") renderLobby(); else updateStandingsFromRoster(r); });
socket.on("scoreboard",(sb)=>renderStandings(sb));
socket.on("round:tracks",(d)=>{ tracks=d.tracks; roundIndex=d.roundIndex; total=d.total; trackIdx=0; revealed=false; roundStatusMap={}; renderRound(); });
socket.on("roundStatus",(rs)=>{
  roundStatusMap={};
  rs.forEach(p=>{ roundStatusMap[p.id]=p; });
  updateRoundStatusUI(rs);
  renderStandingsFromRoundStatus(rs);
});
socket.on("vote:progress",(d)=>{ const el=$("#voteProg"); if(el) el.textContent=`${d.voted} / ${d.total} ont voté`; });
socket.on("reveal:data",(d)=>renderReveal(d));
socket.on("host:done",(sb)=>renderDone(sb));
socket.on("guess",(g)=>{
  const feed=$("#feed"); if(!feed||currentPhase!=="round") return;
  if(feed.querySelector(".muted")) feed.innerHTML="";
  const d=document.createElement("div"); d.className="entry";
  let badge="";
  if(g.titleHit && g.artistHit) badge=`<span style="color:var(--teal);margin-left:6px">🎯 Titre+Artiste</span>`;
  else if(g.titleHit) badge=`<span style="color:var(--gold);margin-left:6px">🎵 Titre</span>`;
  else if(g.artistHit) badge=`<span style="color:var(--magenta);margin-left:6px">🎤 Artiste</span>`;
  d.innerHTML=`<b style="color:${colorOf(g.pid)}">${esc(g.name||"?")}</b> — ${esc(g.text)}${badge}`;
  feed.prepend(d);
});

/* ----------------------------- LOBBY ----------------------------- */
function renderLobby(){
  currentPhase="lobby";
  $("#roundTag").textContent="Salon ouvert";
  const ready=players.filter(p=>p.hasPlaylist).length;
  const joinUrl=location.origin+"/play.html?room="+roomCode;
  stage.innerHTML=`
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 210px;align-items:center;gap:16px">
        <div>
          <div class="eyebrow" style="color:var(--magenta)">Rejoindre la partie</div>
          <div class="muted" style="margin:6px 0 4px">Scanne le QR ou va sur</div>
          <div style="font-size:15px">${location.host}/play.html</div>
          <div style="margin-top:10px" class="muted">et entre le code</div>
          <div class="code">${roomCode}</div>
        </div>
        <div style="background:#fff;padding:10px;border-radius:14px;width:210px;height:210px" id="qr"></div>
      </div>
    </div>
    <div class="card" style="margin-top:18px">
      <div class="row" style="justify-content:space-between;margin-bottom:12px">
        <div class="eyebrow" style="color:var(--gold)">Joueurs (${players.length}) · ${ready} playlist${ready>1?"s":""} prête${ready>1?"s":""}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${players.length?players.map(p=>`
          <div class="row" style="background:var(--panel2);border-radius:11px;padding:9px 11px">
            ${av(p.name,colorOf(p.id),30)}
            <span style="font-weight:700">${esc(p.name)}</span>
            <span style="margin-left:auto" class="${p.hasPlaylist?"":"muted"}">${p.hasPlaylist?"✓":"…"}</span>
          </div>`).join(""):`<div class="muted" style="grid-column:1/-1">En attente des téléphones…</div>`}
      </div>
      <div class="row" style="margin-top:16px;gap:10px">
        <button class="btn ghost" id="addBot" style="flex:none">🤖 Ajouter un bot</button>
        <button class="btn" id="start" style="flex:1" ${ready<2?"disabled":""}>Lancer la partie</button>
      </div>
      <div id="botStatus"></div>
      ${ready<2?`<div class="muted" style="font-size:13px;margin-top:8px">2 playlists minimum pour démarrer.</div>`:""}
    </div>`;
  const qr=$("#qr"); qr.innerHTML="";
  new QRCode(qr,{text:joinUrl,width:190,height:190,colorDark:"#17111f",colorLight:"#ffffff"});
  $("#start").onclick=()=>socket.emit("host:startGame",null,(r)=>{ if(r&&!r.ok) alert(r.error); });
  const addBot=$("#addBot"), botStatus=$("#botStatus");
  addBot.onclick=()=>{
    addBot.disabled=true; addBot.textContent="⏳ Chargement…"; botStatus.innerHTML="";
    socket.emit("host:addBot",null,(r)=>{
      addBot.disabled=false; addBot.textContent="🤖 Ajouter un bot";
      if(!r||!r.ok){ botStatus.innerHTML=`<div class="muted" style="font-size:13px;margin-top:6px;color:var(--magenta)">${esc(r?.error||"Erreur bot")}</div>`; return; }
      botStatus.innerHTML=`<div class="muted" style="font-size:13px;margin-top:6px">${esc(r.name)} ajouté (${r.count} morceaux) ✓</div>`;
    });
  };
}

/* ----------------------------- MANCHE ----------------------------- */
function renderRound(){
  currentPhase="round";
  $("#roundTag").textContent=`Manche ${roundIndex+1} / ${total}`;
  const t=tracks[trackIdx];
  const lastTrack=trackIdx>=tracks.length-1;
  au.src=t.previewUrl;
  stage.innerHTML=`
    <div class="card" style="text-align:center">
      <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div class="pill">👻 Propriétaire : <b style="margin-left:4px">?????</b></div>
        <div class="pill" style="font-family:ui-monospace,monospace;color:var(--gold)">Morceau ${trackIdx+1} / ${tracks.length}</div>
      </div>
      <div class="art" id="art" style="margin-top:16px">${revealed?(t.artwork?`<img src="${esc(t.artwork)}" alt="">`:"🎵"):"❓"}</div>
      <div id="meta" style="margin:12px 0 4px">
        ${revealed?`<div style="font-size:21px;font-weight:800">${esc(t.title)}</div><div style="color:var(--gold)">${esc(t.artist)}</div>`
          :`<div class="muted">Lance l'extrait — les joueurs devinent sur leur téléphone.</div>`}
      </div>
      <div class="bar"><i id="prog"></i></div>
      <div class="row" style="justify-content:center;gap:10px">
        <button class="btn" id="play" style="width:150px">▶︎ Écouter</button>
        ${revealed?"":`<button class="btn ghost" id="rev">👁 Révéler</button>`}
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="eyebrow" style="color:var(--magenta);margin-bottom:8px">Propositions en direct</div>
      <div class="feed" id="feed"><div class="muted">Les réponses des téléphones apparaîtront ici.</div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="eyebrow" style="color:var(--gold);margin-bottom:10px">Qui a trouvé ?</div>
      <div id="playerStatus">
        ${players.map(p=>{
          const s=roundStatusMap[p.id]||{};
          const dot=s.titleFound&&s.artistFound?"dot-both":s.titleFound||s.artistFound?"dot-partial":"dot-none";
          return `<div class="row srow" style="padding:5px 0" id="ps-${p.id}">
            <div class="status-dot ${dot}"></div>
            ${av(p.name,colorOf(p.id),28)}
            <span style="font-weight:600">${esc(p.name)}</span>
            <span class="muted" style="font-size:13px;margin-left:4px">
              ${s.titleFound?'<span style="color:var(--teal)">🎵</span>':""}${s.artistFound?'<span style="color:var(--teal)">🎤</span>':""}
            </span>
            <b style="margin-left:auto;font-family:ui-monospace,monospace;color:var(--gold);font-size:15px">${s.score??p.score??0}</b>
          </div>`;
        }).join("")}
      </div>
      <button class="btn gold" id="next" style="margin-top:14px;width:100%">${lastTrack?"Passer au vote":"Morceau suivant"}</button>
    </div>`;

  const playBtn=$("#play");
  playBtn.onclick=()=>{
    if(au.paused){ au.play(); playBtn.textContent="⏸ Pause"; }
    else{ au.pause(); playBtn.textContent="▶︎ Écouter"; }
  };
  au.ontimeupdate=()=>{ const p=$("#prog"); if(p) p.style.width=((au.currentTime/(au.duration||30))*100)+"%"; };
  au.onended=()=>{ playBtn.textContent="▶︎ Écouter"; };
  const rev=$("#rev");
  if(rev) rev.onclick=()=>{ revealed=true; au.pause(); renderRound(); };
  $("#next").onclick=()=>{
    au.pause();
    if(trackIdx>=tracks.length-1){ socket.emit("host:startVote"); renderVoteWait(); }
    else { trackIdx++; revealed=false; roundStatusMap={}; renderRound(); emitPlayTrack(); }
  };
  // Signal aux joueurs que le morceau démarre
  emitPlayTrack();
}

function emitPlayTrack(){
  socket.emit("host:playTrack",{track:tracks[trackIdx]});
}

function updateRoundStatusUI(rs){
  rs.forEach(p=>{
    const row=document.getElementById("ps-"+p.id); if(!row) return;
    const dot=row.querySelector(".status-dot");
    if(dot){
      dot.className="status-dot "+( p.titleFound&&p.artistFound?"dot-both":p.titleFound||p.artistFound?"dot-partial":"dot-none");
    }
    const spans=row.querySelectorAll("span.muted");
    if(spans[0]){
      spans[0].innerHTML=(p.titleFound?'<span style="color:var(--teal)">🎵</span>':"")+
                         (p.artistFound?'<span style="color:var(--teal)">🎤</span>':"");
    }
    const b=row.querySelector("b"); if(b) b.textContent=p.score;
  });
}

/* ----------------------------- VOTE ----------------------------- */
function renderVoteWait(){
  currentPhase="vote";
  $("#roundTag").textContent=`Manche ${roundIndex+1} / ${total} · vote`;
  stage.innerHTML=`
    <div class="card" style="text-align:center;padding:44px 24px">
      <div style="font-size:46px">👻</div>
      <div class="eyebrow" style="color:var(--magenta);margin-top:8px">Vote secret en cours</div>
      <h1 style="font-size:28px;margin:10px 0">À qui appartient cette playlist&nbsp;?</h1>
      <p class="muted">Chacun vote depuis son téléphone.</p>
      <div id="voteProg" style="font-size:20px;font-weight:800;margin:12px 0 22px">0 / 0 ont voté</div>
      <button class="btn" id="reveal" style="width:260px">Révéler l'imposteur</button>
    </div>`;
  $("#reveal").onclick=()=>socket.emit("host:reveal");
}

/* ----------------------------- REVELATION ----------------------------- */
function renderReveal(d){
  currentPhase="reveal";
  const last=roundIndex>=total-1;
  stage.innerHTML=`
    <div class="card" style="text-align:center">
      <div class="eyebrow" style="color:var(--gold)">La playlist appartenait à…</div>
      <div class="row" style="justify-content:center;gap:12px;margin:14px 0 6px">
        ${av(d.ownerName,"#ffc247",54)}<span style="font-size:32px;font-weight:900">${esc(d.ownerName)}</span>
      </div>
      <div class="muted" style="margin-bottom:16px">
        ${d.votes.filter(v=>v.correct).length===0?"Imposteur parfait — personne ne l'a trouvé·e !":
          "Démasqué·e par "+d.votes.filter(v=>v.correct).map(v=>esc(v.voter)).join(", ")+"."}
      </div>
      <div style="text-align:left;display:flex;flex-direction:column;gap:6px;max-width:440px;margin:0 auto 18px">
        ${d.votes.map(v=>`<div style="display:flex;align-items:center;gap:8px;background:var(--panel2);border-radius:9px;padding:8px 12px;font-size:14px">
          <b>${esc(v.voter||"?")}</b> → <span class="muted">${esc(v.suspect||"?")}</span>
          <span style="margin-left:auto;color:${v.correct?"var(--teal)":"var(--muted)"}">${v.correct?"✓ +2":"raté"}</span>
        </div>`).join("")}
      </div>
      <div class="card" style="background:var(--panel2);text-align:left;margin-bottom:18px">
        <div class="eyebrow" style="color:var(--magenta)">Le débat est ouvert</div>
        <div style="margin-top:8px">« C'était évident, que du son de ${esc(d.ownerName)}… » — accusez, défendez-vous, puis continuez.</div>
      </div>
      <button class="btn gold" id="next" style="width:100%">${last?"Résultats finaux":"Manche suivante"}</button>
    </div>`;
  $("#next").onclick=()=>socket.emit("host:nextRound");
}

/* ----------------------------- FIN ----------------------------- */
function renderDone(sb){
  currentPhase="done";
  $("#roundTag").textContent="Terminé";
  const w=sb[0]||{name:"—",score:0};
  stage.innerHTML=`
    <div class="card" style="text-align:center;padding:48px 24px">
      <div style="font-size:50px">👑</div>
      <div class="eyebrow" style="color:var(--gold)">Vainqueur de la soirée</div>
      <div class="row" style="justify-content:center;gap:12px;margin:12px 0">
        ${av(w.name,"#ffc247",60)}<span style="font-size:38px;font-weight:900">${esc(w.name)}</span>
      </div>
      <div style="color:var(--gold);font-family:ui-monospace,monospace;font-size:18px">${w.score} points</div>
      <button class="btn ghost" style="margin-top:22px" onclick="location.reload()">Nouvelle partie</button>
    </div>`;
  renderStandings(sb);
}

/* ----------------------------- SCORES ----------------------------- */
function renderStandings(sb){
  const el=$("#standings"); if(!el) return;
  if(!sb||!sb.length){ el.innerHTML=`<div class="muted">Personne pour l'instant…</div>`; return; }
  el.innerHTML=sb.map((p,i)=>`<div class="srow">
    <span class="muted" style="width:18px;text-align:center;font-family:ui-monospace,monospace;font-size:12px">${i+1}</span>
    ${av(p.name,colorOf(p.id),26)}<span style="font-weight:600">${esc(p.name)}</span><b>${p.score}</b>
  </div>`).join("");
}
function renderStandingsFromRoundStatus(rs){
  const sorted=[...rs].sort((a,b)=>b.score-a.score);
  renderStandings(sorted);
}
function updateStandingsFromRoster(r){
  renderStandings(r.map(p=>({id:p.id,name:p.name,score:p.score||0})).sort((a,b)=>b.score-a.score));
}
</script>
</body>
</html>
